<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Tienda</title>
</head>

<body>

    <header>
        <nav>
            <ul class="nav-list">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="tienda.html">Tienda</a></li>
                <li><a href="soporte.html">Soporte</a></li>
                <li><a href="experiencias.html">Experiencias</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <h1>Tienda</h1>

    <main>
        <section>
            <div class="order-store">
                <h4 id="h4-store">Ordenar por:</h4>
                <select name="ordenar" id="" value="Ordenar por">
                    <option value="P">Precio</option>
                    <option value="C">Calificación</option>
                    <option value="G">Gratuitos</option>
                    <option value="N">Nombre</option>
                </select>
            </div>
            <div>
                <article class="card-hero">
                    <div class="card-header">
                        <img src="../assets/images/csgo2.jpg"
                        alt="Portada del juego gratuito Counter Strike: Global Offensive 2">
                        <div class="card-hero-content">
                            <h2 class="title">Counter-Strike 2</h2>
                            <p class="price">$0.00</p>
                        </div>
                    </div>
                </article>
                <article class="card-hero">
                    <div class="card-header">
                        <img src="../assets/images/pubg.webp"
                        alt="Portada del juego gratuito PlayerUnknowns BattleGrounds">
                        <div class="card-hero-content">
                            <h2 class="title">PUBG</h2>
                            <p class="price">$0.00</p>
                        </div>
                    </div>
                </article>
                <article class="card-hero">
                    <div class="card-header">
                        <img src="../assets/images/warzone.jpg" alt="Portada del juego gratuito Call Of Duty: Warzone">
                        <div class="card-hero-content">
                        </div>
                        <h2 class="title">Call Of Duty: Warzone</h2>
                        <p class="price">$0.00</p>
                    </div>
                </article>
                <article class="card-hero">
                    <div class="card-header">
                        <img src="../assets/images/subsistence.jpg" alt="Portada del juego Subsistence">
                        <div class="card-hero-content">
                        </div>
                        <h2 class="title">Subsistence</h2>
                        <p class="price">$7.79</p>
                    </div>
                </article>
                <article class="card-hero">
                    <div class="card-header">
                        <img src="../assets/images/rust.webp" alt="Portada del juego Rust">
                        <div class="card-hero-content">
                        </div>
                        <h2 class="title">Rust</h2>
                        <p class="price">$18.99</p>
                    </div>
                </article>
                <article class="card-hero">
                    <div class="card-header">
                        <img src="../assets/images/stranded.jpg" alt="Portada del juego Stranded Deep">
                        <div class="card-hero-content">
                        </div>
                        <h2 class="title">Stranded Deep</h2>
                        <p class="price">$19.99</p>
                    </div>
                </article>
        </section>
    </main>

    <footer id="footer">
        <p>Nuestras redes:</p>
        <a href="twitter.com" target="_blank">Twitter</a>
        <a href="instagram.com" target="_blank">Instagram</a>
        <a href="facebook.com" target="_blank">Facebook</a>
    </footer>
</body>

</html>
